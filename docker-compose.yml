services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: reglens
      POSTGRES_PASSWORD: reglens
      POSTGRES_DB: reglens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reglens"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      # In-network hostnames take precedence over anything in .env
      REGLENS_DATABASE_URL: postgresql+asyncpg://reglens:reglens@postgres:5432/reglens
      REGLENS_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api

  prometheus:
    build: ./infra/prometheus
    ports:
      - "9090:9090"

  grafana:
    build: ./infra/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
