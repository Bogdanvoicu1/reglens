name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: reglens
          POSTGRES_PASSWORD: reglens
          POSTGRES_DB: reglens
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U reglens"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      REGLENS_DATABASE_URL: postgresql+asyncpg://reglens:reglens@localhost:5432/reglens
      REGLENS_REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy app
      - run: uv run alembic upgrade head
      - run: uv run pytest -q
      - name: Verify migrations roll back cleanly
        run: uv run alembic downgrade base && uv run alembic upgrade head

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc -b
      - run: npx vitest run
      - run: npm run build

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
        working-directory: backend
      - name: Audit backend dependencies
        run: uv run pip-audit --skip-editable
        working-directory: backend
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
        working-directory: frontend
